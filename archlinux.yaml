# This is targeted to an Incus container. Instead of a dev user, just clone this container.
# Install openssh
# Connect as root, allow ssh as root with password
# Install python
- name: Setup hosts after install
  hosts:
    - archlinux_server
  vars:
    username: valankar
  tasks:
    - name: Install rate-mirrors
      community.general.pacman:
        name: rate-mirrors
        update_cache: true
    - name: Run rate-mirrors and save mirrorlist
      ansible.builtin.shell: |
        rate-mirrors --allow-root arch | tee /etc/pacman.d/mirrorlist
    - name: Upgrade packages
      community.general.pacman:
        upgrade: true
        update_cache: true
      notify: Reboot
    - name: Install packages
      community.general.pacman:
        name:
          - ast-grep
          - base-devel
          - bat
          - bind
          - docker
          - docker-buildx
          - docker-compose
          - dua-cli
          - duf
          - fd
          - fish
          - fuse3
          - fzf
          - ghostty-terminfo
          - git
          - go-task
          - lazygit
          - ledger
          - luarocks
          - neovim
          - npm
          - powerline
          - python
          - python-pip
          - rate-mirrors
          - rclone
          - rsync
          - ripgrep
          - strace
          - stylua
          - tmux
          - tmuxp
          - uv
          - unison
          - unzip
          - wget
      notify: Reboot
    - name: sudo without password
      ansible.builtin.copy:
        src: common/11-nopasswd
        dest: /etc/sudoers.d/11-nopasswd
        mode: "600"
    - name: Enable docker
      ansible.builtin.systemd:
        name: docker.service
        enabled: yes
      notify: Reboot
    - name: Add users to docker group, generate ssh key, set fish shell
      ansible.builtin.user:
        name: "{{ username }}"
        shell: /bin/fish
        groups: docker
        append: yes
        generate_ssh_key: true
    - name: Add user to wheel
      ansible.builtin.user:
        name: "{{ username }}"
        groups: wheel
        append: yes
    - name: Ensure user bin directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/bin"
        state: directory
        mode: "755"
        owner: "{{ username }}"
        group: "{{ username }}"
    - name: Ensure user systemd directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/.config/systemd/user"
        state: directory
        mode: "755"
        owner: "{{ username }}"
        group: "{{ username }}"
    - name: Add systemd kopia unit
      ansible.builtin.copy:
        src: "common/kopia.service"
        dest: "/etc/systemd/system/kopia.service"
        mode: "644"
        owner: "root"
        group: "root"
    - name: Check if lingering is enabled
      ansible.builtin.stat:
        path: "/var/lib/systemd/linger/{{ username }}"
      register: linger_file
      changed_when: false
    - name: Enable linger
      ansible.builtin.command: "loginctl enable-linger {{ username }}"
      when: not linger_file.stat.exists
    - name: Setup tmux config
      block:
      - name: Ensure user tmux config directory exists
        ansible.builtin.file:
          path: "/home/{{ username }}/.config/tmux"
          state: directory
          mode: "755"
          owner: "{{ username }}"
          group: "{{ username }}"
    - name: Setup tmux config
      ansible.builtin.copy:
        dest: "/home/{{ username }}/.config/tmux/tmux.conf"
        mode: "644"
        owner: "{{ username }}"
        group: "{{ username }}"
        content: |
          source /usr/share/powerline/bindings/tmux/powerline.conf
          set -g mouse on
          set-option -g mode-keys vi
    - name: paru setup
      kewlfft.aur.aur:
        name: paru
        use: makepkg
        state: present
      become: yes
      become_user: "{{ username }}"
    - name: AUR packages
      kewlfft.aur.aur:
        use: paru
        name:
          - arch-update
          - kopia-bin
          - lazydocker-bin
          - opencode-bin
      become: yes
      become_user: "{{ username }}"
    - name: Copy package update script
      ansible.builtin.copy:
        src: cachyos/updates.sh
        dest: "/home/{{ username }}/bin/updates.sh"
        mode: "755"
        owner: "{{ username }}"
        group: "{{ username }}"
    - name: Copy arch-update config
      ansible.builtin.copy:
        src: cachyos/arch-update.conf
        dest: "/home/{{ username }}/.config/arch-update/"
        mode: "644"
        owner: "{{ username }}"
        group: "{{ username }}"
    - name: Add systemd user units
      ansible.builtin.copy:
        src: "cachyos/{{ item }}"
        dest: "/home/{{ username }}/.config/systemd/user/{{ item }}"
        mode: "644"
        owner: "{{ username }}"
        group: "{{ username }}"
      loop:
        - updates.service
        - updates.timer
  handlers:
    - import_tasks: common/global_handlers.yaml
